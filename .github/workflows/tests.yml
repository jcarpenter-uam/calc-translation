name: Server Test Gates

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/tests.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install server dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: API coverage gate
        run: |
          cd server
          pytest -q -c pytest.ini

      - name: Services coverage gate
        run: |
          cd server
          pytest -q -c pytest-services.ini

      - name: Production modules 100% coverage gate
        run: |
          cd server
          pytest -q -o addopts='' \
            --cov=api \
            --cov=core \
            --cov=integrations \
            --cov=main \
            --cov=models \
            --cov=services \
            --cov-report=term-missing \
            --cov-fail-under=100
