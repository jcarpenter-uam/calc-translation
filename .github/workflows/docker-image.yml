name: Docker Image CI

on:
  release:
    types: [published] # This workflow runs only when a new release is published

jobs:
  test-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}/server
      SONIOX_API_KEY: ci-soniox-key
      DATABASE_URL: postgresql://ci:ci@localhost:5432/calc_translation
      ENCRYPTION_KEY: DyQ9UONijJtaxy5YgYe9WY3ZrFWrUv7b40J25sPe_84=
      JWT_SECRET_KEY: ci-jwt-secret
      ZM_PUBLIC_KEY: ci-public-key
      ZM_RTMS_CLIENT: ci-rtms-client
      ZM_RTMS_SECRET: ci-rtms-secret
      MAILER_TENANT_ID: ci-tenant
      MAILER_CLIENT_ID: ci-mailer-client
      MAILER_CLIENT_SECRET: ci-mailer-secret
      MAILER_SENDER_EMAIL: ci@example.com
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install server dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Python import path preflight
        run: |
          pwd
          python -c "import os, sys; print('python=', sys.executable); print('cwd=', os.getcwd()); print('PYTHONPATH=', os.getenv('PYTHONPATH')); print('sys.path=', sys.path)"
          python -c "import api, core, services, integrations; print('imports=ok')"

      - name: API coverage gate
        run: |
          python -m pytest -q -c pytest.ini

      - name: Services coverage gate
        run: |
          python -m pytest -q -c pytest-services.ini

      - name: TTFT gate (deterministic)
        run: |
          python -m pytest -q -s -o addopts='' \
            tests/test_api_transcribe.py::test_transcribe_ttft_from_audio_to_first_soniox_token

      - name: Production modules 100% coverage gate
        run: |
          python -m pytest -q -o addopts='' \
            --cov=api \
            --cov=core \
            --cov=integrations \
            --cov=main \
            --cov=models \
            --cov=services \
            --cov-report=term-missing \
            --cov-fail-under=100

  build-and-push:
    needs: test-gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for server
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/translation-server

      - name: Build and push server docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}

      - name: Extract metadata for zoom rtms
        id: meta_rtms
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/zoom-rtms

      - name: Build and push zoom rtms docker image
        uses: docker/build-push-action@v5
        with:
          context: ./integrations/zoom-rtms
          push: true
          tags: ${{ steps.meta_rtms.outputs.tags }}
          labels: ${{ steps.meta_rtms.outputs.labels }}
