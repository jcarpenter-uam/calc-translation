name: Live TTFT (Soniox)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  live-ttft:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SONIOX_API_KEY: ${{ secrets.SONIOX_API_KEY }}
      DATABASE_URL: postgresql://ci:ci@localhost:5432/calc_translation
      ENCRYPTION_KEY: DyQ9UONijJtaxy5YgYe9WY3ZrFWrUv7b40J25sPe_84=
      JWT_SECRET_KEY: ci-jwt-secret
      ZM_PUBLIC_KEY: ci-public-key
      ZM_RTMS_CLIENT: ci-rtms-client
      ZM_RTMS_SECRET: ci-rtms-secret
      MAILER_TENANT_ID: ci-tenant
      MAILER_CLIENT_ID: ci-mailer-client
      MAILER_CLIENT_SECRET: ci-mailer-secret
      MAILER_SENDER_EMAIL: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install server dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run live TTFT test
        run: |
          make server-ttft-live
